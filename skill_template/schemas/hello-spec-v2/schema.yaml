name: hello-spec-v2
version: 2
language_policy:
  output_language: zh-CN
  rules:
    - All generated human-facing artifacts MUST be written in Simplified Chinese.
    - Keep code identifiers, file paths, CLI commands, API names, package names, branch names, error messages, and config keys in their original language.
    - Normative keywords such as MUST, SHALL, SHOULD, MAY can remain in English when required by spec format, but the surrounding explanation MUST be Chinese.
    - If an invoked Skill returns English content, translate and adapt it into Simplified Chinese before writing final artifacts.
    - Do not produce an all-English proposal, design, task list, or plan unless the user explicitly requests English.
description: >
  AI-native Spec-driven Development workflow (Chinese artifacts) based on
  hello-spec-v2 proposal directories, Superpowers strong SOPs,
  AI context discipline, grill-with-docs DDD clarification, and the gotchas
  knowledge flywheel.
  Flow: brainstorm -> proposal -> specs -> design -> [GATE-1 clarify gate]
  -> tasks -> plan -> apply -> [GATE-2 retrospective + gotchas flywheel].
  The apply phase uses git worktrees and subagent-driven development.
  All human-facing artifacts default to Simplified Chinese (see language_policy).

# ─────────────────────────────────────────────────────────────
# Knowledge Flywheel — global convention, observed by all phases
# ─────────────────────────────────────────────────────────────
knowledge_flywheel:
  # Project-level long-lived assets dir (cross-change, travels with the project)
  project_assets_dir: ".ai_doc/spec-workflow/"
  files:
    context: ".ai_doc/spec-workflow/CONTEXT.md"   # DDD ubiquitous-language glossary (maintained inline by the GATE-1 clarify gate)
    adr_dir: ".ai_doc/spec-workflow/adr/"         # Architecture Decision Records (lazily created only when 3 criteria hold)
    gotchas: ".ai_doc/spec-workflow/gotchas.md"   # Project-level gotchas (distilled by the gotchas governance skill)
    test_policy: ".ai_doc/spec-workflow/test_policy.yaml" # Project-level repo test capability overrides (optional)
  global_gotchas: "~/.agents/gotchas/general.md"  # General gotchas (promoted after recurring in >=2 projects)
  global_prompting: "~/.agents/gotchas/prompting.md"  # Personal prompting-quality self-check list (NOT auto-injected; for the user only)
  memory_boundary: |
    Memory types are physically isolated. Classify before writing; reject if mis-typed:
    - Terminology         -> CONTEXT.md
    - Arch decisions      -> adr/
    - Recurring gotchas   -> gotchas.md / general.md (written ONLY by the governance skill)
    - Code-stage issues   -> troubleshoot.md -> backup.md [代码偏差]
    - Planning deviations -> revise.md -> backup.md [规划偏差]
    - Manual test commands -> manual_test_commands.md (copyable targeted commands for the user to run)
    - Human decisions    -> human-decisions.md (lazy execution/review-stage decision queue)
    - Original input      -> intake.md (verbatim snapshot of the user's prompt doc)
    - Prompting habits    -> prompting.md (the user's own prompt self-check; NOT auto-injected)
    (backup.md is the SHARED archive for both code & planning fixes, distinguished by scene marker.)
  consume: |
    [Consumer] Before diverging, the brainstorm phase MUST load and inject:
      1. .ai_doc/spec-workflow/gotchas.md (project gotchas)
      2. ~/.agents/gotchas/general.md (general gotchas, read if present)
      3. .ai_doc/spec-workflow/CONTEXT.md (terminology, read if present)
    Tag-matching (make it explicit, do not guess silently):
      a. First WRITE OUT the domain tags this change touches (e.g. lang-go,
         infra-api-contract, flow-openspec) — reason from the change's scope.
      b. Then filter library entries by those tags; per bucket take Top-5 by hits.
    Inject the matches as a "known-gotchas checklist + terminology constraints",
    referencing entry IDs / term names only — never paste the body.
    Audit trail (mandatory, makes the step verifiable): the produced artifact
    MUST contain one line — `已查 gotchas：标签[<tags>] 命中[G-012,GG-003] / 无匹配`
    — so a reviewer can see the step was actually performed.
  produce: |
    [Producer] After GATE-2, MANUALLY run the `gotchas` governance skill on
    backup.md + spec-workflow-retro.md to distill gotchas through the three
    gates (admission / layering / eviction) into the gotchas libraries.

# ─────────────────────────────────────────────────────────────
# AI Context Discipline — observed by all phases, audited in artifacts
# ─────────────────────────────────────────────────────────────
ai_context_discipline:
  principle: |
    This is an AI-first workflow contract, not a style preference. The main
    thread keeps only decision-grade summaries; full bodies live on disk and are
    read by the worker that needs them. Every phase must leave a small audit trail
    so reviewers can verify that context was handled intentionally.
  rules:
    - Read-depth tiering: the main thread reads only titles/frontmatter/summaries of each artifact; subagents read full bodies from disk on demand. Never inline large files into the main context.
    - Write-to-disk, not return: subagents write outputs directly to hello-spec-v2 proposal directories or .ai_doc/spec-workflow/; the orchestrator receives only "file path + 1-3 line summary".
    - Evidence summary: after reading each key file, emit a 1-3 line "key-facts summary (with path + line numbers)"; reason from summaries to avoid re-reads.
    - Checkpoint to disk: at the end of each gate/phase, output "next command + suggested /clear" to enable lossless cross-session handoff.
    - Predicate memory: gotchas/CONTEXT use single-line grep-able entries, not prose; inject by ID, never paste the body.
    - Human decision queue: when AI cannot safely decide during apply/review/debug/MR handling, lazily write a recommendation to human-decisions.md instead of leaving the decision only in chat.
  audit_contract: |
    Any phase that creates or materially updates brainstorm.md, proposal.md,
    specs/**/*.md, design.md, tasks.md, plan.md, spec_code_review.md,
    debug-report.md, spec-workflow-retro.md, or human-decisions.md MUST append
    or update this section in the touched artifact:

    ## Agent Execution Audit
    - Context discipline: PASS | PARTIAL | FAIL
    - Key files read: <path:line summary bullets, or none>
    - Large content inlined: no | yes:<reason>
    - Output written to disk: yes | no:<reason>
    - Human decision queue: <none | D001,D002 in human-decisions.md>
    - Next command: `<copyable command or none>`
    - Suggested /clear resume: `<copyable command or none>`

    If an artifact format cannot safely include this section, write the same
    fields into human-decisions.md or the phase terminal summary and reference
    the artifact path.

# ─────────────────────────────────────────────────────────────
# Test Capability Policy — per-repo, not one-size-fits-all
# ─────────────────────────────────────────────────────────────
test_policy:
  principle: |
    Do NOT use a global "no unit tests" rule. Decide by repository capability:
    - Repos that can run targeted unit tests MUST use test-first / regression-test-first steps for behavior changes.
    - Repos that cannot run unit tests may skip unit-test execution, but must record why and fall back to gopls diagnostics / code review / manual verification.
    - Repos not listed in project/user overrides default to `unit_test_required` after identity detection, unless repo docs or the user explicitly say targeted unit tests are not runnable.
    - Full-suite commands such as `go test ./...` or full `go build` remain forbidden unless the repo explicitly says they are safe.
  default: unit_test_required
  override_files:
    project: ".ai_doc/spec-workflow/test_policy.yaml"
    user: "~/.agents/test_policy.yaml"
  rules: |
    Before tasks/plan/apply, classify every touched repo as one of:
    0. Identify repository identity first:
       - run/read equivalent of `git remote get-url origin` for repo remote;
       - read `module ...` from go.mod for Go module when present;
       - do NOT classify by absolute worktree path only, because development may
         happen under feature worktree directories rather than `main`.
       - read project override `.ai_doc/spec-workflow/test_policy.yaml` if present;
       - read user override `~/.agents/test_policy.yaml` if present;
       - override priority: proposal tasks/plan classification > project override
         > user override > schema default.
    - `unit_test_required`: targeted unit tests can run; plan must include test-first or regression-test-first micro-steps, and apply should run/capture targeted commands when safe.
    - `manual_test_only`: tests exist or can be inferred, but agent should not run them; write copyable commands to manual_test_commands.md for the user.
    - `unit_test_disabled`: unit tests are known broken/too costly; do not generate mandatory test tasks, do not run go test, and record the reason in manual_test_commands.md or the plan.
    - `unknown`: inspect repo docs/AGENTS and nearby scripts. If still unclear
      and no override says otherwise, default to `unit_test_required` for behavior
      changes, but use targeted package/test commands only.
    Persist the classification in tasks.md/plan.md before apply so executors do
    not need to re-infer it from memory.
    For Go, prefer package-scoped targeted commands (`go test ./pkg -run 'TestXxx' -count=1`).
    For non-Go repos, use existing package scripts only if they are clearly targeted and cheap.

artifacts:
  - id: brainstorm
    generates: brainstorm.md
    description: Collaborative design exploration using Superpowers brainstorming
    template: brainstorm.md
    instruction: |
      Use the Skill tool to invoke **superpowers:brainstorming**.

      FIRST (Flywheel consumer · inject before diverging): load the knowledge
      libraries and inject context before brainstorming:
      - Read `.ai_doc/spec-workflow/gotchas.md` (project gotchas; skip if absent)
      - Read `~/.agents/gotchas/general.md` (general gotchas; skip if absent)
      - Read `.ai_doc/spec-workflow/CONTEXT.md` (glossary; skip if absent)
      Tag-matching (explicit, no silent guessing):
      a. WRITE OUT the domain tags this change touches (e.g. lang-go,
         infra-api-contract, flow-openspec) before filtering.
      b. Filter library entries by those tags; per bucket take Top-5 by hits.
      Bring matches in as a "known-gotchas checklist + terminology constraints",
      referencing entry IDs / term names only — never paste the body.
      Audit trail (mandatory): write one line at the END of brainstorm.md —
      `已查 gotchas：标签[<tags>] 命中[<ids>] / 无匹配` — so the step is verifiable.

      IMPORTANT output redirection:
      - Do NOT write to `docs/superpowers/specs/`. Instead, write the
        brainstorming design output directly to this change's `brainstorm.md`.
      - If brainstorming produces a design document, also write it to
        this change's `design.md` (this will pre-fill the design artifact).

      After brainstorming completes, summarize the agreed design in
      brainstorm.md using the template structure (the gotchas audit line above
      already covers traceability of referenced entries). Do NOT add an
      "Open Questions" section to brainstorm.md — unresolved items belong ONLY
      in design.md's Open Questions (single source), to avoid dual-source drift.

      The brainstorming skill will:
      1. Explore project context
      2. Ask clarifying questions (one at a time)
      3. Propose 2-3 approaches with trade-offs
      4. Present design sections for approval
      5. Output the validated design
    requires: []

  - id: troubleshoot
    generates: troubleshoot.md
    description: Placeholder for post-implementation issue records, consumed by the /spec-trouble-resolve workflow.
    template: troubleshoot.md
    instruction: |
      Create troubleshoot.md as an empty placeholder using the template verbatim.
      DO NOT generate any issue content. This file is intentionally empty at
      proposal-creation time. Its purpose is to provide a known location for
      the user to append problem reports after implementation, which will then
      be consumed by the `/spec-trouble-resolve` command.

      Rules:
      - Copy the template content as-is. No edits, no inferred entries.
      - Do not summarize design/plan into this file.
      - Companion file `backup.md` will be created lazily by the resolve
        workflow on first archival; do NOT pre-create it here.
    requires: []

  - id: revise
    generates: revise.md
    description: Placeholder for planning-stage (doc) deviation records, consumed by the spec-plan-revise skill.
    template: revise.md
    instruction: |
      Create revise.md as an empty placeholder using the template verbatim.
      DO NOT generate any deviation content. This file is intentionally empty at
      proposal-creation time. Its purpose is to provide a known location for the
      user to record planning-stage deviations (proposal/specs/design/tasks/plan
      not matching intent), later consumed by the `spec-plan-revise` skill.

      Rules:
      - Copy the template content as-is. No edits, no inferred entries.
      - Archival goes to the shared `backup.md` (scene marker [规划偏差]); do NOT
        pre-create backup.md here.
    requires: []

  - id: manual-test-commands
    generates: manual_test_commands.md
    description: Proposal-level ledger for copyable manual test commands generated whenever any stage adds or modifies test files.
    template: manual_test_commands.md
    instruction: |
      Create manual_test_commands.md as a placeholder using the template verbatim.
      At proposal-creation time, keep it as a lightweight empty inbox:
      do NOT infer commands, do NOT add examples, and do NOT expand the rules
      outside the template comment. This file is updated later by
      implementation/review/fix stages when they add or modify test files.

      Later-stage rules:
      - Any stage that creates or modifies test files MUST append or update a
        record in this file.
      - Commands must be copyable and include `cd <absolute repo path>`.
      - Commands must be targeted. Do not write broad commands such as
        `go test ./...` unless the repo explicitly requires them.
      - If the agent is not allowed to run tests, still write the command with
        `Status=not_run_by_skill` or `skipped_by_repo_rule`.
      - If a reliable command cannot be inferred, write the reason instead of
        inventing one.
    requires: []

  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: |
      Create the proposal document based on the brainstorming output.

      Read brainstorm.md for the validated design. Extract:
      - **Why**: The motivation (from brainstorming discussion)
      - **What Changes**: Specific changes agreed upon
      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each becomes a new `specs/<name>/spec.md`. Use kebab-case names.
        - **Modified Capabilities**: List existing capabilities whose REQUIREMENTS are changing. Check the repo's baseline specs directory for existing spec names.
      - **Impact**: Affected code, APIs, dependencies, or systems.

      Since brainstorming already explored the problem space,
      this should be a concise extraction, not a new exploration.

      IMPORTANT: The Capabilities section is critical. It creates the contract between
      proposal and specs phases. Each capability listed here will need a spec file.

      Keep it concise (1-2 pages). Focus on the "why" not the "how".
    requires:
      - brainstorm
      - troubleshoot
      - revise
      - manual-test-commands

  - id: specs
    generates: "specs/**/*.md"
    description: Detailed specifications for the change
    template: spec.md
    instruction: |
      Create specification files that define WHAT the system should do.

      Create one spec file per capability listed in the proposal's Capabilities section.
      - New capabilities: use the exact kebab-case name from the proposal (specs/<capability>/spec.md).
      - Modified capabilities: use the existing spec folder name from the repo's baseline specs directory when creating the delta spec at specs/<capability>/spec.md.

      Delta operations (use ## headers):
      - **ADDED Requirements**: New capabilities
      - **MODIFIED Requirements**: Changed behavior - MUST include full updated content
      - **REMOVED Requirements**: Deprecated features - MUST include **Reason** and **Migration**
      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format

      Format requirements:
      - Each requirement: `### Requirement: <name>` followed by description
      - Use SHALL/MUST for normative requirements (avoid should/may)
      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format
      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`). Using 3 hashtags or bullets will fail silently.
      - Every requirement MUST have at least one scenario.

      Specs should be testable - each scenario is a potential test case.
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: |
      Create the design document explaining HOW to implement the change.

      Check if brainstorming already produced a design.md file.
      If design.md already exists with content from brainstorming,
      review and refine it rather than starting from scratch.

      If design.md is empty or doesn't exist, create it from
      the brainstorm.md output.

      Sections:
      - **Context**: Background, current state, constraints, stakeholders
      - **Goals / Non-Goals**: What this design achieves and explicitly excludes
      - **Decisions**: Key technical choices with rationale (why X over Y?). Include alternatives considered.
      - **Risks / Trade-offs**: Known limitations, things that could go wrong. Format: [Risk] → Mitigation
      - **Migration Plan**: Steps to deploy, rollback strategy (if applicable)
      - **Open Questions**: Outstanding decisions or unknowns to resolve

      Focus on architecture and approach, not line-by-line implementation.
      Good design docs explain the "why" behind technical decisions.
    requires:
      - brainstorm
      - specs

  - id: grill-spec
    generates: design.md
    template: design.md
    description: DDD-aware grilling gate (powered by grill-with-docs) that resolves open questions, sharpens terminology into CONTEXT.md, and records hard decisions as ADRs.
    instruction: |
      Use the Skill tool to invoke **grill-with-docs**.

      Purpose: before moving to implementation planning, clarify and nail down
      every open question, sharpen fuzzy terms into ubiquitous language, and
      record hard-to-reverse decisions as ADRs. This gate keeps later context
      clean and prevents rework.

      IMPORTANT path override (grill-with-docs defaults to repo root; redirect it):
      - Do NOT write CONTEXT.md to repo root. Write to `.ai_doc/spec-workflow/CONTEXT.md`.
      - Do NOT write ADRs to `docs/adr/`. Write to `.ai_doc/spec-workflow/adr/NNNN-<slug>.md`.
      - If a `CONTEXT-MAP.md` is needed, it also lives under `.ai_doc/spec-workflow/`.

      Inputs (read-only, on demand, obey ai_context_discipline):
      - This change's `design.md` (focus: Open Questions section)
      - This change's `specs/**/*.md` (focus: ambiguous / unclear-boundary scenarios)
      - `.ai_doc/spec-workflow/CONTEXT.md` (existing terms, read if present)
      - `.ai_doc/spec-workflow/adr/` (existing decisions, read if present)

      grill-with-docs will: ask ONE question at a time with a recommended answer
      (explore code/docs instead of asking when answerable); stress-test domain
      boundaries with concrete scenarios; write resolved terms INLINE to CONTEXT.md;
      and offer an ADR only when all three hold (hard to reverse + surprising
      without context + a real trade-off). New ADRs MUST carry `日期` + `来源提案`.

      ADR invalidation (when a new decision overturns an existing ADR): do NOT
      delete or move it — keep it in place, set its Status to
      `superseded by ADR-NNNN` (or `deprecated`) with a dated reason; the new ADR
      notes `取代：ADR-NNNN`. (gotchas archive away; ADRs stay for a continuous
      decision history.)

      Persistence requirements (core of keeping context clean):
      - Write resolutions BACK into this change's `design.md` Decisions section,
        and CLEAR the Open Questions section. design.md is the SINGLE source of
        truth for Open Questions — brainstorm.md has no such section.
      - If a legacy brainstorm.md still carries an "Open Questions" section,
        reconcile it: move unresolved items into design.md's Open Questions and
        remove the section from brainstorm (avoid dual-source drift).
      - End the phase with an "open-items list": either all resolved, or
        explicitly marked "pending user confirmation + reason".
      - Do not keep the clarification in conversation memory — persist everything.
      - List the touched CONTEXT terms / ADR numbers (incl. superseded ones) for traceability.

      If a later偏差 surfaces AFTER tasks/plan are already generated, do NOT just
      re-run this gate (it only rewrites design.md, leaving tasks/plan adrift) —
      use **spec-plan-revise** to clarify and sync the whole downstream chain.

      If grill-with-docs is unavailable, fall back to manually clarifying each
      Open Question and writing the result back into design.md.
    requires:
      - design

  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: |
      Create the task list that breaks down the implementation work.

      **IMPORTANT: Follow the template below exactly.** The apply phase parses
      checkbox format to track progress. Tasks not using `- [ ]` won't be tracked.

      Guidelines:
      - Group related tasks under ## numbered headings
      - Each task MUST be a checkbox: `- [ ] X.Y Task description`
      - Tasks should be small enough to complete in one session
      - Order tasks by dependency (what must be done first?)
      - Apply `test_policy` per touched repo:
        - `unit_test_required`: include targeted regression-test tasks before/with code changes.
        - `manual_test_only`: include manual verification command tasks that update manual_test_commands.md.
        - `unit_test_disabled`: do not add mandatory unit-test tasks; record the reason and fallback checks.
      - Never add broad full-suite commands (`go test ./...`, full `go build`) unless the repo explicitly allows them.
      - Write a short "测试能力分类" note into tasks.md listing each touched repo,
        its `unit_test_required/manual_test_only/unit_test_disabled/unknown`
        classification, and the evidence (`repo_remote`, `go_module`, repo docs,
        or user confirmation). This note is consumed by plan/apply.

      Reference specs for what needs to be built, design for how to build it.
      Each task should be verifiable - you know when it's done.
    requires:
      - specs
      - design
      - grill-spec

  - id: plan
    generates: plan.md
    description: Micro-task implementation plan using Superpowers writing-plans
    template: plan.md
    instruction: |
      Use the Skill tool to invoke **superpowers:writing-plans**.

      IMPORTANT output redirection:
      - Do NOT write to `docs/superpowers/plans/`. Instead, write
        the plan directly to this change's `plan.md`.
      - Apply `test_policy` per touched repo. If a repo is `unit_test_required`,
        plan targeted test-first / regression-test-first micro-steps. If a repo
        is `unit_test_disabled`, do not add mandatory unit-test execution steps;
        record the reason and fallback checks. Full `go build` and full-suite
        `go test ./...` remain forbidden unless the repo explicitly allows them.
      - Read the "测试能力分类" note from tasks.md. If it is missing, create it
        before writing implementation micro-steps by matching repo remote/module
        against project/user `test_policy.yaml` overrides; do not rely on local
        worktree path equality. If no override matches, use schema default
        `unit_test_required`.
      - **NO auto-commit steps**: do NOT generate any `git add` / `git commit`
        tasks. Code changes must be reviewed by the human FIRST; committing is a
        manual action the user performs after review. The plan ends at "code
        written + diagnostics pass", never at "committed".

      The writing-plans skill will:
      1. Read the tasks.md and design.md for context
      2. Break each task into 2-5 minute micro-steps (TDD style)
      3. Include exact file paths, code snippets, test commands
      4. Mark a logical "review point" after each task (a place where the human
         reviews the diff) — NOT an auto git commit.

      Pass the tasks.md content to the skill as the input for
      decomposition. The plan should reference the specs and
      design artifacts in this change directory.
    requires:
      - tasks

apply:
  requires: [plan]
  tracks: tasks.md
  instruction: |
    Note when implementing: do not run full `go build` or full-suite `go test ./...` by default. Use `test_policy` per touched repo. Some repos can run targeted unit tests and must use them; some repos cannot run unit tests and must fall back to gopls/manual verification.

    0. **AI Context Discipline**: obey the top-level `ai_context_discipline` throughout:
       - the main thread reads only summaries/frontmatter; subagents read full
         bodies from disk; never inline large files;
       - subagents return only "path + 1-3 line summary" after writing to disk;
       - checkpoint plan.md/tasks.md to disk after each task for resumability.
       - maintain the `Agent Execution Audit` section in touched artifacts when
         a phase creates or materially changes them.

    0.1 **Gotchas red-line injection**: before starting:
       a. WRITE OUT the domain tags this change touches (explicit, no silent guess);
       b. load `.ai_doc/spec-workflow/gotchas.md` and `~/.agents/gotchas/general.md`,
          filter by those tags (per bucket Top-5 by hits), and pass them to the
          executor as a [red-line checklist] for subagents (IDs + do/don't only);
       c. Audit trail (mandatory): record one line in the apply log / first task —
          `已查 gotchas：标签[<tags>] 命中[<ids>] / 无匹配` — so the step is verifiable.

    0.2 **Test capability classification**: before coding, classify each touched
       repo using top-level `test_policy`:
       - Identify repo by `git remote get-url origin` and, for Go repos, the
         `module` line in go.mod. Do not classify by absolute path equality only:
         worktrees may be under feature directories instead of `main`.
       - `unit_test_required`: targeted unit tests can run. For behavior changes,
         write/adjust regression tests first when feasible, run only targeted
         package/test commands, and capture commands/results in
         `manual_test_commands.md`.
       - `manual_test_only`: do not auto-run tests, but write copyable targeted
         commands in `manual_test_commands.md`.
       - `unit_test_disabled`: do not generate mandatory unit-test execution
         steps; record the reason and rely on gopls diagnostics / code review /
         manual checks.
       - `unknown`: inspect repo docs/AGENTS; if still unclear and the repo is
         not explicitly listed as `unit_test_disabled`, default to
         `unit_test_required` for behavior changes, using targeted commands only.
       Audit trail (mandatory): record one line —
       `测试能力：<repo>=<unit_test_required|manual_test_only|unit_test_disabled|unknown>，依据：<repo_remote/go_module/repo-doc/user-confirmation>`。
       Also ensure tasks.md/plan.md contain the same classification so subagents
       can consume it after /clear or in a fresh worktree.

    0.3 **Human decision queue**: before coding, read `human-decisions.md` if it exists.
       This is a lazy execution/review-stage queue, not a planning-stage
       substitute for grill-spec. Missing file means no execution-stage decision
       has been raised yet.
       - If it contains unresolved `pending_human` decisions that block the
         current task, stop and ask the user to approve/reject/defer them.
       - If implementation uncovers a new unsafe decision, write a `Dxxx` entry
         with AI recommendation and options instead of leaving the decision only
         in chat.
       - Do not commit or mark apply complete while blocking decisions remain
         `pending_human`.

    1. **Executor**: Use the Skill tool to invoke **superpowers:subagent-driven-development** to execute the plan.md micro-tasks with fresh subagents per task.

       Tell the executor:
       - Read plan.md in this change directory for micro-tasks
       - Update plan.md checkboxes status for finished tasks
       - Update tasks.md checkboxes as coarse tasks complete
       - Work within the created worktree
       - Obey the gotchas red-lines injected in step 0.1
       - Obey the test capability classification from step 0.2. In
         `unit_test_required` repos, write targeted regression tests for behavior
         changes and run targeted commands when safe. In `unit_test_disabled`
         repos, do not run unit tests and document the fallback.
       - If any task creates or modifies test files (`*_test.go`, `*.spec.*`,
         `*.test.*`, or project-specific test files), append/update a record in
         this change's `manual_test_commands.md` with copyable targeted commands
         for the user to run manually. Each command must include `cd <absolute
         repo path>` and avoid broad full-suite commands unless the repo requires
         them. For Go, prefer package-scoped commands such as:
         `go test ./server_middleware -run 'TestSceneFromRequest' -count=1`.
         If repo rules forbid agent-run tests, mark `Status=not_run_by_skill` or
         `skipped_by_repo_rule`; still write the command.
       - **NO auto-commit**: write code and update checkboxes only; do NOT run
         `git add` / `git commit`. Code must wait for the human's review before
         any commit. Stop at "code written + diagnostics pass".

    2. **Completion**: When all tasks are done, present the diff for the user's
       REVIEW first. Only AFTER the user approves should commit/PR happen — and
       the commit is the user's call. If the user explicitly asks to wrap up,
       you may invoke **superpowers:finishing-a-development-branch**; otherwise do
       NOT auto-commit or auto-create a PR.

    3. **Diagnostics**: After code implementation is complete, invoke the gopls MCP tool's go_diagnostics to validate correctness. Any error-level diagnostics must be fixed and re-validated until all checks pass.

    4. **Troubleshoot scope**: `troubleshoot.md` is NOT written by the apply phase or any subagent. It is a user-curated file. Issues discovered during implementation must be appended manually by the developer and are later consumed by the `/spec-trouble-resolve` command. Do not let executors auto-populate it.

    5. **Manual test command ledger**: `manual_test_commands.md` is the unified
       proposal-level place for copyable manual test commands. Before declaring
       apply complete, if git diff shows new/modified test files, verify that
       this file contains matching targeted commands or a clear reason why no
       reliable command could be inferred.

    6. **Human decision ledger**: before declaring apply complete, ensure every
       unresolved `human_decision` / design-risk item discovered during apply is
       represented in `human-decisions.md`, and that blocking `pending_human`
       entries are called out in the final summary.

    If any skill is unavailable, fall back to manual implementation
    using the standard task-by-task loop from tasks.md.

retrospective:
  trigger: Manual (run after a change is implemented and archived via /spec-trouble-resolve)
  instruction: |
    This is the [producer] side of the knowledge flywheel — two manual,
    decoupled steps:

    Step 1 · Produce retro material: run the **spec-opti-workflow-v2** skill to
      produce `spec-workflow-retro.md` for this change. Pass the ORIGINAL PROMPT
      DOC path as $2 (expected by default, e.g. your `0_biz_impl/<date>-<name>.md`)
      to also trigger INPUT-SIDE reflection: it copies the prompt doc verbatim to
      `intake.md` and attributes each backup issue to ①prompt / ②tacit-knowledge /
      ③implementation-slip with a ratio. Retro material includes: coding-style
      preferences / AGENTS.md blind spots / architecture reflections / reusable-asset
      CANDIDATES / prompting-habit CANDIDATES (pmt-*). It only produces material —
      it does not write gotchas/prompting and does not drop skill files. If $2 is
      omitted, input-side reflection is skipped (the skill will say so).

    Step 2 · Distill into the library: run the **gotchas** governance skill on
      this change's backup.md + spec-workflow-retro.md, through three gates:
      - Admission gate: admit only if all hold — ① recurring ② has `when`
        ③ has `do`/`don't`; "spec was underspecified" issues do NOT belong in
        gotchas — they feed `prompting.md` instead.
      - Layering gate: gotchas first into `.ai_doc/spec-workflow/gotchas.md`,
        promote to `~/.agents/gotchas/general.md` after recurring in >=2 projects;
        prompting candidates go straight into the global `~/.agents/gotchas/prompting.md`.
      - Eviction gate (tag-bucketed): no global hard cap. Group entries by tag;
        on duplicates only upsert the hit count; entries fossilized by CI/lint or
        with long-zero hits -> archived. See the gotchas skill for per-bucket soft
        limits (30) and inject Top-N (5) rules. `prompting.md` is NEVER auto-injected.

    Reusable skills/commands: spec-opti-workflow-v2 produces only "candidate
    descriptions"; the user reviews and copies them into ~/.agents/skills
    manually. Never pile skill files inside the change directory.

    Flywheel closure: the distilled gotchas/CONTEXT are auto-consumed by the next
    change's brainstorm phase.

# ─────────────────────────────────────────────────────────────
# Revision — handling planning-stage (doc-phase) deviations (NOT an artifact)
# ─────────────────────────────────────────────────────────────
revision:
  trigger: Manual (when generated planning docs deviate from intent, AFTER they exist)
  instruction: |
    When a generated planning doc (proposal/specs/design/tasks/plan) deviates from
    your intent, do NOT stuff it into troubleshoot.md (that + /spec-trouble-resolve
    are for CODE-stage issues with a real diff). Instead run **spec-plan-revise**.

    spec-plan-revise is the single entry point for planning-stage deviations:
    - Input: PRIMARY = `revise.md` in the change dir (recorded deviations, for
      later review); fallback = free-text `$ARGUMENTS`. Prefer revise.md.
    - It locates the deviation's source layer and syncs the WHOLE downstream chain
      (proposal → specs → design → tasks → plan), keeping the four doc types aligned.
    - It has BUILT-IN clarification (grill-with-docs style, one-stop): if the
      deviation is "requirement not thought through", it grills you in place —
      no jumping to another skill — then fixes + syncs.
    - plan.md is regenerated via superpowers:writing-plans; other docs follow their
      schema instructions + templates. CONTEXT/ADR writes are redirected to
      `.ai_doc/spec-workflow/`.
    - Archival: appends to the SHARED `backup.md` with scene marker `[规划偏差]`
      (spec-trouble-resolve uses `[代码偏差]`); revise.md is cleared after处理.
    - It only edits DOCS, never code. If existing code is affected, it points you to
      `/spec-trouble-resolve`.

    Boundary recap:
    - Planning-stage (docs) deviation -> revise.md + spec-plan-revise -> backup.md[规划偏差]
    - Code-stage (post-apply) issue   -> troubleshoot.md + /spec-trouble-resolve -> backup.md[代码偏差]

# ─────────────────────────────────────────────────────────────
# Debug — end-to-end test root-cause location (NOT an artifact)
# ─────────────────────────────────────────────────────────────
debug:
  trigger: Manual (after apply, during end-to-end testing, when symptom is unclear and root cause unknown)
  instruction: |
    When end-to-end testing surfaces a problem but you don't know where it is,
    run **spec-e2e-debug** — a provider-based read-only root-cause locator.

    - Input: PRIMARY = `debug.md` in the change dir (symptom / request id or logid /
      service name / environment / config / experiment / repro). Lazily created — write it when testing fails, or dictate
      and let the skill draft it. At least a logid OR (service name + time) is needed.
    - It runs a HYPOTHESIS→VERIFY loop using the selected diagnostic provider
      (for example bytedcli, another project CLI, or no-provider fallback) to
      locate the root cause, then classifies it into one of four: code bug /
      business-logic issue / normal behavior / edge case — each with an evidence chain.
    - Provider capabilities are open-ended, not a closed whitelist. If debug.md
      mentions a platform/tool not listed in the common capability table, the
      skill should use provider-native command discovery, classify candidate
      commands as read-only/write-capable, and only run commands that are proven
      read-only. Unsupported or unclear commands are reported as evidence gaps or
      manual actions.
    - Output: `debug-report.md` in the change dir (NOT backup.md — it's a diagnosis,
      not a fix archive).
    - Output path lock: spec-e2e-debug may only append diagnostic reports to
      `debug-report.md` and reset `debug.md` after archiving its full input.
      It must NOT write `backup.md`, must NOT edit business code, and must NOT
      perform the repair itself even when the conclusion is "code bug".
    - 🔴 READ-ONLY HARD LINE: the skill executes ONLY read/query provider calls.
      ANY write op (config changes, experiment changes, instance/deploy/DB writes,
      RPC-that-writes, etc.) is FORBIDDEN to execute — it only lists the command
      + risk for the user to run manually. A mis-write here can cause a
      production incident.
    - Log handling: dumps key-psm logs to a temp file and greps for hits — never
      inlines whole logs (context safety).

    Exit pointers (diagnosis only, no auto-handoff):
    - code bug -> run `/spec-trouble-resolve` to fix
    - business-logic issue -> clarify via design / spec-plan-revise
    - normal behavior / edge case -> explained in report, no code change

    Boundary: spec-e2e-debug = locate root cause (read-only, internal-net);
    spec-trouble-resolve = fix the code once you know it's a code bug.

# ─────────────────────────────────────────────────────────────
# Code Review — AI pre-commit review report (NOT an artifact)
# ─────────────────────────────────────────────────────────────
code_review:
  trigger: Manual (after apply, before spec-commit-push)
  instruction: |
    After apply completes and before committing, run **spec-code-review** to
    create an AI pre-commit review report.

    - It uses an independent reviewer perspective (prefer a different model if
      the platform supports it) to reduce confirmation bias from the coding
      agent.
    - It reviews BOTH directions:
      1. implementation vs proposal/spec/design/tasks;
      2. spec/design vs real code context, including changed-symbol references,
         adjacent patterns, shared contracts, business boundaries, naming,
         simplicity, and verification gaps.
    - Output: `spec_code_review.md` in the proposal directory.
    - The report includes a structured `Fix Queue` and a one-line
      `Coding Agent Copy Prompt` with the report's absolute path, so you can
      copy it directly to a coding agent for follow-up fixes.
    - Human-facing report prose MUST be Simplified Chinese. Keep code symbols,
      file paths, SQL/IDL/RPC/API names, and status enums in their original
      English form, but do not write English narrative bullets in the final
      report.
    - The report must include `CR Readiness`: `Ready for human CR: YES / NO /
      PARTIAL`, the reason, remaining blockers, and the recommended low-cost
      human review scope. `PASS` is not automatic submit approval; it only means
      the reviewer did not find a blocker.
    - If code generation added or modified test files, the report must include
      `Manual Test Commands`: copyable targeted commands for the user to run
      manually. Do not auto-run heavy tests in large Go repos; still write the
      command, e.g. `cd <repo> && go test ./server_middleware -run
      'TestSceneFromRequest' -count=1`.
    - `spec-code-review` must also inspect the proposal-level
      `manual_test_commands.md` ledger. If changed test files are missing
      matching ledger commands, report it as a verification gap and include a
      suggested copyable command in the review report.
    - If the report has multiple `Review Run` sections, the copy prompt must
      tell the coding agent to process ONLY the latest run's `Fix Queue` rows
      with `Status=accepted`.
    - Any `human_decision` row must point to an entry in `human-decisions.md`
      (`Dxxx`) or create one with the AI recommendation and blocking scope.
    - First version is report-only: it does NOT edit code, does NOT start an
      infinite review/fix loop, and does NOT commit/push.

    Suggested handoff after reading the report:
    - "修 Fix Queue 里 Status=accepted 的项"
    - or "只修 R001/R003，R002 先跳过"

# ─────────────────────────────────────────────────────────────
# Commit — multi-repo commit & push closure (NOT an artifact)
# ─────────────────────────────────────────────────────────────
commit:
  trigger: Manual (after apply, spec-code-review/human review, when ready to commit & push)
  instruction: |
    After apply is done, spec-code-review/human review has passed, run
    **spec-commit-push <proposal-name-or-absolute-proposal-dir>** to close the
    loop: multi-repo rebase +规范 commit + confirm-then-push.

    Recommended:
    - `spec-commit-push <change-name>` when you are in the repo/worktree.
    - `spec-commit-push /abs/path/to/openspec/changes/<change-name>` after
      `/clear`, in a cold context, or when multiple proposals exist.
    - No-argument invocation is only a hot-context shortcut. If the proposal
      cannot be uniquely inferred, the skill MUST stop and ask for the proposal
      name/path instead of guessing.

    - Locates all repos/branches changed by this sdd work (same discovery as
      fix-mr-comments); each repo commits & pushes independently.
    - Each call FETCHES + REBASES origin/master (master iterates fast; deferring
      rebase only makes conflicts worse). Rebase conflict -> STOPS, gives advice,
      the USER resolves manually (skill never auto-resolves).
    - Generates a CONCISE Conventional-Commits message from the proposal
      (background / what changed / blast radius), Chinese-first with English terms
      kept. First commit = full background; later commits = incremental.
    - Review readiness preflight: if `spec_code_review.md` exists in the proposal
      directory, read the latest Review Run. If `CR Readiness` is `NO` or the
      latest Fix Queue still has unresolved `Status=accepted` rows, stop and ask
      the user to fix/decide first. If readiness is `PARTIAL` or the report is
      missing, show the risk and require short-code `r` before continuing.
      `PASS` is not automatic submit approval.
    - Human decision preflight: read `human-decisions.md` if present. Any blocking
      `pending_human` item stops commit/push until the user approves, rejects, or
      explicitly defers it.
    - CONFIRM gate: shows message + diff stat; user can tweak the message verbally
      before anything is committed. Push only after short-code confirmation:
      `r` to accept review-readiness risk when needed, `y` for ordinary
      commit+push, `f` for force-with-lease after the diff has been shown, `n`
      to cancel, `e` to edit message. Do not ask the user to type a full
      confirmation sentence.
    - 🔴 Protected-branch hard line (3 checks) — never commit/push to master etc.
    - 🔴 NEVER auto-force. Rebasing an already-pushed branch diverges -> STOPS,
      shows local-vs-remote diff, and only on the user's explicit OK uses
      `--force-with-lease` (never bare --force).
    - No archival file (git history is the record).

    May be called MULTIPLE times during one proposal (incremental commits).
    Next step: after push, MR comments are handled by `fix-mr-comments`.
